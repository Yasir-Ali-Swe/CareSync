<!doctype html>
<html>
  <body style="margin:0;padding:0;background:#f5f7fb;font-family:Arial,sans-serif;color:#111827;">
    <table width="100%" cellpadding="0" cellspacing="0" style="padding:24px 0;">
      <tr>
        <td align="center">
          <table width="600" cellpadding="0" cellspacing="0" style="max-width:600px;background:#ffffff;border-radius:12px;overflow:hidden;border:1px solid #e5e7eb;">
            <tr><td style="background:#7c3aed;padding:20px 24px;color:#fff;font-size:22px;font-weight:700;">{{appName}}</td></tr>
            <tr>
              <td style="padding:24px;">
                <h2 style="margin:0 0 12px;font-size:20px;">Appointment Reminder</h2>
                <p style="margin:0 0 8px;line-height:1.6;">Hi {{fullName}}, this is a reminder for your upcoming appointment.</p>
                <div style="background:#f5f3ff;border:1px solid #ddd6fe;border-radius:10px;padding:14px;margin:16px 0;">
                  <p style="margin:0 0 6px;"><strong>Doctor:</strong> {{doctorName}}</p>
                  <p style="margin:0;"><strong>Date & Time:</strong> {{dateTime}}</p>
                </div>
                <p style="margin:0;color:#6b7280;font-size:13px;">Need help? Contact us at {{supportEmail}}</p>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
