<!doctype html>
<html>
  <body style="margin:0;padding:0;background:#f5f7fb;font-family:Arial,sans-serif;color:#111827;">
    <table width="100%" cellpadding="0" cellspacing="0" style="padding:24px 0;">
      <tr>
        <td align="center">
          <table width="600" cellpadding="0" cellspacing="0" style="max-width:600px;background:#ffffff;border-radius:12px;overflow:hidden;border:1px solid #e5e7eb;">
            <tr><td style="background:#111827;padding:20px 24px;color:#fff;font-size:22px;font-weight:700;">{{appName}}</td></tr>
            <tr>
              <td style="padding:24px;">
                <h2 style="margin:0 0 12px;font-size:20px;">Reset your password</h2>
                <p style="margin:0 0 16px;line-height:1.6;">Hi {{fullName}}, we received a request to reset your {{appName}} password. Use the button below to continue.</p>
                <p style="text-align:center;margin:28px 0;">
                  <a href="{{actionUrl}}" style="background:#111827;color:#fff;text-decoration:none;padding:12px 22px;border-radius:8px;display:inline-block;font-weight:600;">{{actionLabel}}</a>
                </p>
                <p style="margin:0 0 8px;color:#6b7280;font-size:13px;">If you didn’t request this, you can ignore this email.</p>
                <p style="margin:0 0 12px;font-size:13px;word-break:break-all;"><a href="{{actionUrl}}">{{actionUrl}}</a></p>
                <p style="margin:0;color:#6b7280;font-size:13px;">Need help? Contact us at {{supportEmail}}</p>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
